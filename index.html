<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        /* Đảm bảo html và body chiếm toàn bộ màn hình, không bị cuộn và xóa khoảng lề */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
        }

        .brdCmb .pTtl.itm { display: none; }
    </style>
    <script src="https://v8.js-dos.com/v6.22/js-dos.js"></script>
</head>
<body>
    <canvas id="jsdos"></canvas>
    
    <script>
        const canvas = document.getElementById("jsdos");

        // Khởi tạo DOSBox
        Dos(canvas, {
            wdosboxUrl: "https://v8.js-dos.com/v6.22/dosbox.js",
        }).ready((fs, main) => {
            fs.extract("https://cdn.jsdelivr.net/gh/armyno/mario@main/MARIO.jsdos").then(() => {
                main(["-conf", ".jsdos/dosbox.conf"]);
            });
        });

        // Kích hoạt Fullscreen khi nhấp đúp chuột (Double-click) vào game
        canvas.addEventListener("dblclick", () => {
            if (!document.fullscreenElement) {
                // Yêu cầu bật toàn màn hình
                if (canvas.requestFullscreen) {
                    canvas.requestFullscreen();
                } else if (canvas.webkitRequestFullscreen) { /* Dành cho Safari */
                    canvas.webkitRequestFullscreen();
                } else if (canvas.msRequestFullscreen) { /* Dành cho IE11 */
                    canvas.msRequestFullscreen();
                }
            } else {
                // Thoát toàn màn hình
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Dành cho Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* Dành cho IE11 */
                    document.msExitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
