<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mario DOS</title>
    <style>
        /* Xóa khoảng lề mặc định và ẩn thanh cuộn */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000; /* Nền đen cho đẹp mắt */
        }

        /* Ép canvas chiếm 100% diện tích cửa sổ trình duyệt */
        #jsdos {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
    <script src="https://v8.js-dos.com/v6.22/js-dos.js"></script>
</head>
<body>
    <canvas id="jsdos"></canvas>
    
    <script>
        const canvas = document.getElementById("jsdos");

        // 1. Khởi tạo game như cũ
        Dos(canvas, {
            wdosboxUrl: "https://v8.js-dos.com/v6.22/dosbox.js",
        }).ready((fs, main) => {
            fs.extract("https://cdn.jsdelivr.net/gh/armyno/mario@main/MARIO.jsdos").then(() => {
                main(["-conf", ".jsdos/dosbox.conf"]);
            });
        });

        // 2. Thêm sự kiện nhấp đúp chuột để bật/tắt chế độ Toàn màn hình
        canvas.addEventListener("dblclick", () => {
            if (!document.fullscreenElement) {
                // Bật toàn màn hình
                if (canvas.requestFullscreen) {
                    canvas.requestFullscreen();
                } else if (canvas.webkitRequestFullscreen) { /* Safari */
                    canvas.webkitRequestFullscreen();
                } else if (canvas.msRequestFullscreen) { /* IE11 */
                    canvas.msRequestFullscreen();
                }
            } else {
                // Thoát toàn màn hình
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
